<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prijavnica – Specialna razstava za Šarplanince CAC</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f6f8;}
header{background:#2e7d32;color:white;text-align:center;padding:30px;}
.container{max-width:800px;margin:30px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 0 15px rgba(0,0,0,0.1);} 
h2{color:#2e7d32;}
form{display:flex;flex-direction:column;}
label{margin-top:15px;font-weight:bold;}
input,select,textarea{padding:10px;margin-top:5px;border-radius:5px;border:1px solid #ccc;font-size:16px;width:100%;}
button{margin-top:25px;padding:15px;background:#2e7d32;color:white;font-size:16px;border:none;border-radius:8px;cursor:pointer;}
button:hover{background:#1b5e20;}
.required{color:red;}
.success{background:#e8f5e9;color:#2e7d32;padding:15px;margin-top:20px;border-radius:8px;display:none;}
small{color:#555;}
label.gdpr-label{display: flex;align-items: center;margin-top: 15px;}
label.gdpr-label input[type="checkbox"]{width: auto;margin-right: 10px;}
</style>
</head>
<body>

<header>
<h1>🐕 Prijava na Specialno razstavo za Šarplanince<br>Application for Special Šarplaninac Show</h1>
<p>25. April 2026 – Cerknica</p>
</header>

<div class="container">
<form id="prijavaForm" action="https://tajazgur.app.n8n.cloud/webhook/Prijave na specialno razstavo za sarplanince" method="POST" enctype="multipart/form-data">

<!-- Owner Info -->
<h2>Podatki lastnika / Owner Information</h2>
<label>Ime / First Name <span class="required">*</span></label>
<input type="text" name="ime" required>
<label>Priimek / Last Name <span class="required">*</span></label>
<input type="text" name="priimek" required>
<label>Državljanstvo / Nationality <span class="required">*</span></label>
<select name="drzavljanstvo" required>
  <option value="">Izberi / Select</option>
  <option>Slovenija / Slovenia</option>
  <option>Hrvaška / Croatia</option>
  <option>Srbija / Serbia</option>
  <option>Bosna in Hercegovina / Bosnia and Herzegovina</option>
  <option>Črna gora / Montenegro</option>
  <option>Makedonija / Macedonia</option>
  <option>Albanija / Albania</option>
  <option>Kosovo / Kosovo</option>
  <option>Avstrija / Austria</option>
  <option>Nemčija / Germany</option>
  <option>Italija / Italy</option>
  <option>Švica / Switzerland</option>
  <option>Francija / France</option>
  <option>Belgija / Belgium</option>
  <option>Nizozemska / Netherlands</option>
  <option>Španija / Spain</option>
  <option>Portugalska / Portugal</option>
  <option>Poljska / Poland</option>
  <option>Češka / Czech Republic</option>
  <option>Slovaška / Slovakia</option>
  <option>Madžarska / Hungary</option>
  <option>Romunija / Romania</option>
  <option>Grčija / Greece</option>
  <option>Danska / Denmark</option>
  <option>Norveška / Norway</option>
  <option>Švedska / Sweden</option>
</select>
<label>Naslov / Address <span class="required">*</span></label>
<input type="text" name="naslov" placeholder="Ulica, hišna številka / Street, House No." required>
<label>Poštna številka / Postal Code <span class="required">*</span></label>
<input type="text" name="posta" placeholder="1000" required>
<label>Mesto / City <span class="required">*</span></label>
<input type="text" name="mesto" placeholder="Ljubljana" required>
<label>Email <span class="required">*</span></label>
<input type="email" name="email" required>
<label>Telefon / Phone <span class="required">*</span></label>
<input type="tel" name="telefon" required>

<!-- Dog Info -->
<h2>Podatki o psu / Dog Information</h2>
<label>Ime psa / Dog Name <span class="required">*</span></label>
<input type="text" name="ime_psa" required>
<label>Spol / Sex <span class="required">*</span></label>
<select name="spol" required>
<option value="">Izberi / Select</option>
<option>Pes / Male</option>
<option>Psica / Female</option>
</select>
<label>Datum rojstva / Date of Birth <span class="required">*</span></label>
<input type="date" name="datum" required>
<label>Razred / Class <span class="required">*</span></label>
<select name="razred" required>
<option value="">Izberi / Select</option>
<option>Prvaki / Champions</option>
<option>Odprti / Open</option>
<option>Vmesni / Intermediate</option>
<option>Mladi / Junior</option>
<option>Najmlajši / Baby</option>
<option>Mladiči / Puppy</option>
<option>Veterani / Veteran</option>
</select>
<label>Ime matere / Mother's Name <span class="required">*</span></label>
<input type="text" name="ime_matere" required>
<label>Ime očeta / Father's Name <span class="required">*</span></label>
<input type="text" name="ime_oceta" required>
<label>Par / Pair <span class="required">*</span></label>
<select name="par" required>
<option value="">Izberi / Select</option>
<option>Da / Yes</option>
<option>Ne / No</option>
</select>
<label>Rodovnik (slika ali PDF) / Pedigree (image or PDF) <span class="required">*</span></label>
<input type="file" name="rodovnik" accept="image/*,.pdf" required>
<small>Max 5MB</small>
<div id="championField" style="display:none;">
<label>Potrdilo o šampionatu / Champion Title Certificate <span class="required">*</span></label>
<input type="file" name="champion_certificate" accept="image/*,.pdf">
<small>Upload only if dog is Champion (max 5MB)</small>
</div>
<label>Opombe / Notes</label>
<textarea rows="4" name="opombe"></textarea>

<label class="gdpr-label">
  <input type="checkbox" name="gdpr" value="Da" required>
  Soglašam z obdelavo osebnih podatkov / I agree to data processing <span class="required">*</span>
</label>


<button type="submit">Oddaj prijavo / Submit Application</button>
<div class="success" id="successMessage">
✅ Prijava uspešno oddana! / Application submitted successfully!
</div>
</form>
</div>

<script>
document.getElementById("prijavaForm").addEventListener("submit", function(event){
  event.preventDefault();
  const form = event.target;

  // GDPR check
  const gdpr = form.querySelector('input[name="gdpr"]');
  if(!gdpr.checked){
    alert("Prosimo, da se strinjate z obdelavo osebnih podatkov / Please agree to data processing");
    return;
  }

  // Champion certificate check
  const razred = form.querySelector('select[name="razred"]').value;
  const champFile = form.querySelector('input[name="champion_certificate"]');
  if(razred === "Prvaki / Champions" && !champFile.value){
    alert("Prosim, priložite Potrdilo o šampionatu / Please attach Champion Certificate");
    return;
  }

  // Prepare FormData for n8n: rodovnik + champion_certificate as binary, rest as text
  const formData = new FormData();
  const files = ['rodovnik', 'champion_certificate'];
  files.forEach(name => {
    const input = form.querySelector(`input[name="${name}"]`);
    if(input && input.files.length > 0){
      formData.append(name, input.files[0]);
    }
  });

  // Add text fields
  form.querySelectorAll('input, select, textarea').forEach(el=>{
    if(!files.includes(el.name)){
      formData.append(el.name, el.value);
    }
  });

  fetch(form.action,{
    method:"POST",
    body: formData
  }).then(()=>{
    document.getElementById("successMessage").style.display="block";
    form.reset();
    document.getElementById("championField").style.display = "none";
  }).catch(()=>{
    alert("Prišlo je do napake / An error occurred");
  });
});

// Show champion certificate field if needed
const razredSelect = document.querySelector('select[name="razred"]');
const championField = document.getElementById("championField");
razredSelect.addEventListener("change", function() {
  if(this.value === "Prvaki / Champions"){
    championField.style.display = "block";
    championField.querySelector('input').required = true;
  } else {
    championField.style.display = "none";
    championField.querySelector('input').required = false;
    championField.querySelector('input').value = "";
  }
});
</script>
</body>
</html>
